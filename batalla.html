<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Batalla Pokemon</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="headerContainer"></div>

<div class="content">

<h1>Batalla Pokémon</h1>

<div class="battle-area">

<div class="pokemon-box">

<h2 id="p1Name">Pokemon 1</h2>
<img id="p1Img">
<p>Vida: <span id="p1Hp">100</span>%</p>

<ul id="p1Stats"></ul>

</div>

<div class="pokemon-box">

<h2 id="p2Name">Pokemon 2</h2>
<img id="p2Img">
<p>Vida: <span id="p2Hp">100</span>%</p>

<ul id="p2Stats"></ul>

</div>

</div>

<div class="battle-log" id="battleLog">
Selecciona 2 Pokémon para comenzar la batalla
</div>

<div id="winnerArea" class="winner-area"></div>

<hr>

<h2>Selecciona 2 Pokémon</h2>

<div id="pokemonContainer" class="card-container"></div>

</div>

<div id="footerContainer"></div>

<script src="app.js"></script>
<script src="batalla.js"></script>

</body>
</html>
